bgg {
  accessToken = ""
  accessToken = ${?BGG_ACCESS_TOKEN}
  timeoutSeconds = 60
  timeoutSeconds = ${?BGG_TIMEOUT}
  retries = 6
  retries = ${?BGG_RETRIES}
  retryDelaySeconds = 10
  retryDelaySeconds = ${?BGG_RETRY_DELAY}
}

cache {
  backend = "dynamodb"
  backend = ${?CACHE_BACKEND}
  requestCacheTtlSeconds = 86400
  requestCacheTtlSeconds = ${?REQUEST_CACHE_DURATION}
  gameCacheTtlSeconds = 604800
  gameCacheTtlSeconds = ${?GAME_CACHE_DURATION}
  vectorMinRatings = 100
  vectorMinRatings = ${?VECTOR_MIN_RATINGS}
  sqliteRequestCachePath = "bgg_request_cache.sqlite"
  sqliteRequestCachePath = ${?SQLITE_REQUEST_CACHE_PATH}
  sqliteGameCachePath = "bgg_game_cache.sqlite"
  sqliteGameCachePath = ${?SQLITE_GAME_CACHE_PATH}
  sqliteVectorStorePath = "bgg_game_vectors.sqlite"
  sqliteVectorStorePath = ${?SQLITE_VECTOR_STORE_PATH}
  sqlitePrefetchStatusPath = "bgg_prefetch_status.sqlite"
  sqlitePrefetchStatusPath = ${?SQLITE_PREFETCH_STATUS_PATH}
}

aws {
  region = "us-east-1"
  region = ${?AWS_REGION}
  dynamoRequestTable = "bgg-request-cache"
  dynamoRequestTable = ${?DYNAMODB_REQUEST_TABLE}
  dynamoGameTable = "bgg-game-cache"
  dynamoGameTable = ${?DYNAMODB_GAME_TABLE}
  dynamoVectorTable = "bgg-game-vectors"
  dynamoVectorTable = ${?DYNAMODB_VECTOR_TABLE}
  dynamoPrefetchTable = "bgg-prefetch-status"
  dynamoPrefetchTable = ${?DYNAMODB_PREFETCH_TABLE}
  prefetchSqsUrl = ""
  prefetchSqsUrl = ${?PREFETCH_SQS_URL}
}

server {
  host = "0.0.0.0"
  host = ${?SERVER_HOST}
  port = 8080
  port = ${?SERVER_PORT}
  allowedOrigins = ["*"]
}
