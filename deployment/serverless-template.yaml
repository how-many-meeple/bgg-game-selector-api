AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'BGG Game Selector API - Serverless deployment (AWS Free Tier optimized)'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource naming
    AllowedValues:
      - production
      - staging
      - dev

  RateLimitPerMinute:
    Type: Number
    Default: 100
    Description: Maximum API requests per minute per IP (prevents abuse)
    MinValue: 10
    MaxValue: 1000

  BurstLimit:
    Type: Number
    Default: 200
    Description: Maximum burst capacity for API Gateway
    MinValue: 50
    MaxValue: 5000

  BggAccessToken:
    Type: String
    NoEcho: true
    Default: "PLACEHOLDER_REPLACE_ON_DEPLOY"
    Description: BoardGameGeek API access token (pass via --parameter-overrides on deploy)

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: python3.13
    Environment:
      Variables:
        CACHE_BACKEND: dynamodb
        DYNAMODB_REQUEST_TABLE: !Ref RequestCacheTable
        DYNAMODB_GAME_TABLE: !Ref GameCacheTable
        DYNAMODB_VECTOR_TABLE: !Ref GameVectorsTable
        DYNAMODB_PREFETCH_TABLE: !Ref PrefetchStatusTable
        FLASK_ENV: production
        BGG_ACCESS_TOKEN: !Ref BggAccessToken
        BGG_TIMEOUT: '60'
        BGG_RETRIES: '6'
        BGG_RETRY_DELAY: '10'
        REQUEST_CACHE_DURATION: '86400'
        GAME_CACHE_DURATION: '604800'

Resources:
  # IAM Role for API Gateway to write CloudWatch Logs (Account-level, one-time setup)
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account (sets CloudWatch role for entire account)
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  # DynamoDB Table for request cache (collections, searches) - FREE TIER
  RequestCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-request-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector
        - Key: CacheType
          Value: request-cache
        - Key: CostCenter
          Value: free-tier

  # DynamoDB Table for game cache (individual game data) - FREE TIER
  GameCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-game-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector
        - Key: CacheType
          Value: game-cache
        - Key: CostCenter
          Value: free-tier

  # DynamoDB Table for prefetch status (tracks in-flight and terminal prefetch results)
  PrefetchStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-prefetch-status
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector
        - Key: CacheType
          Value: prefetch-status
        - Key: CostCenter
          Value: free-tier

  # SQS Queue for prefetch jobs (FREE TIER: 1M requests/month)
  PrefetchQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-bgg-prefetch-queue
      VisibilityTimeout: 960  # 16 min — must exceed worker Lambda timeout (15 min)
      MessageRetentionPeriod: 3600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PrefetchDeadLetterQueue.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  PrefetchDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-bgg-prefetch-dlq
      MessageRetentionPeriod: 86400
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  # DynamoDB Table for game vectors (permanent store — no TTL)
  GameVectorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-game-vectors
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: N
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector
        - Key: Purpose
          Value: game-vectors

  # Lambda Function (FREE TIER: 1M requests/month, 400K GB-seconds compute)
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-bgg-api
      CodeUri: ../
      Handler: lambda_handler.handler
      Description: BGG Game Selector API - Serverless handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          PREFETCH_SQS_URL: !Ref PrefetchQueue
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameVectorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PrefetchStatusTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt PrefetchQueue.QueueName
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /health
            Method: GET
        HealthCheckOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /health
            Method: OPTIONS
        GetCollection:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /collection/{username}
            Method: GET
        GetCollectionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /collection/{username}
            Method: OPTIONS
        GetGeekList:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /geeklist/{geek_list}
            Method: GET
        GetGeekListOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /geeklist/{geek_list}
            Method: OPTIONS
        SearchGames:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /search/{game_name}
            Method: GET
        SearchGamesOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /search/{game_name}
            Method: OPTIONS
        CorsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /cors-proxy/{url}
            Method: GET
        CorsProxyOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /cors-proxy/{url}
            Method: OPTIONS
        RecommendationsFromGames:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/from-games
            Method: POST
        RecommendationsFromGamesOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/from-games
            Method: OPTIONS
        RecommendationsSchema:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/schema
            Method: GET
        RecommendationsSchemaOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/schema
            Method: OPTIONS
        Prefetch:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch
            Method: POST
        PrefetchOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch
            Method: OPTIONS
        PrefetchStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch/status/{source_type}/{source_id}
            Method: GET
        PrefetchStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch/status/{source_type}/{source_id}
            Method: OPTIONS
      Tags:
        Environment: !Ref EnvironmentName

  # Worker Lambda — triggered by SQS, 15 min timeout to give BGG maximum time to respond
  PrefetchWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-bgg-prefetch-worker
      CodeUri: ../
      Handler: prefetch_worker.handler
      Description: BGG prefetch worker — fetches BGG data async and warms the cache
      Timeout: 900
      Architectures:
        - x86_64
      Environment:
        Variables:
          PREFETCH_SQS_URL: !Ref PrefetchQueue
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameVectorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PrefetchStatusTable
        - SQSPollerPolicy:
            QueueName: !GetAtt PrefetchQueue.QueueName
      Events:
        PrefetchQueueTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt PrefetchQueue.Arn
            BatchSize: 1
      Tags:
        Environment: !Ref EnvironmentName

  # API Gateway (FREE TIER: 1M API calls/month)
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${EnvironmentName}-bgg-api
      StageName: !Ref EnvironmentName
      Description: BGG Game Selector API Gateway
      # CORS is handled by Flask-CORS in the Lambda — OPTIONS requests are routed to Lambda
      # so it can return the correct Access-Control-Allow-* headers without MOCK integrations,
      # which break when BinaryMediaTypes includes */* (API Gateway fails to decode MOCK body).
      # Throttling to prevent abuse (FREE TIER PROTECTION)
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: !Ref RateLimitPerMinute
          ThrottlingBurstLimit: !Ref BurstLimit
          LoggingLevel: ERROR
          DataTraceEnabled: false
          MetricsEnabled: true
      BinaryMediaTypes:
        - '*~1*'
      # API Key requirement (optional, uncomment for additional security)
      # Auth:
      #   ApiKeyRequired: true
      Tags:
        Environment: !Ref EnvironmentName
        CostCenter: free-tier

  # CloudWatch Log Group (FREE TIER: 5GB ingestion, 5GB archive, 7-day retention)
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 7  # Keep costs minimal

  # CloudWatch Alarms for cost monitoring
  HighRequestAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-bgg-api-high-requests
      AlarmDescription: Alert when API requests exceed 80% of free tier (800K requests)
      MetricName: Count
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 86400  # 24 hours
      EvaluationPeriods: 1
      Threshold: 800000  # 80% of 1M free tier
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Ref ApiGateway
      TreatMissingData: notBreaching

  HighDynamoDBReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-bgg-dynamodb-high-reads
      AlarmDescription: Alert on unusually high DynamoDB read units
      MetricName: ConsumedReadCapacityUnits
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 50000  # Alerts if > 50K reads/hour
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref GameCacheTable
      TreatMissingData: notBreaching

  # WAF Web ACL for additional security (Optional, small cost ~$5/month)
  # Uncomment if you need DDoS protection beyond throttling
  # WebACL:
  #   Type: AWS::WAFv2::WebACL
  #   Properties:
  #     Name: !Sub ${EnvironmentName}-bgg-api-waf
  #     Scope: REGIONAL
  #     DefaultAction:
  #       Allow: {}
  #     Rules:
  #       - Name: RateLimitRule
  #         Priority: 1
  #         Statement:
  #           RateBasedStatement:
  #             Limit: 2000  # 2000 requests per 5 minutes per IP
  #             AggregateKeyType: IP
  #         Action:
  #           Block: {}
  #         VisibilityConfig:
  #           SampledRequestsEnabled: true
  #           CloudWatchMetricsEnabled: true
  #           MetricName: RateLimitRule
  #     VisibilityConfig:
  #       SampledRequestsEnabled: true
  #       CloudWatchMetricsEnabled: true
  #       MetricName: !Sub ${EnvironmentName}-bgg-waf

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
    Export:
      Name: !Sub ${EnvironmentName}-bgg-api-url

  ApiId:
    Description: API Gateway ID
    Value: !Ref ApiGateway
    Export:
      Name: !Sub ${EnvironmentName}-bgg-api-id

  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub ${EnvironmentName}-bgg-function-arn

  DynamoDBRequestTableName:
    Description: DynamoDB table name for request cache
    Value: !Ref RequestCacheTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-request-cache-table

  DynamoDBGameTableName:
    Description: DynamoDB table name for game cache
    Value: !Ref GameCacheTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-game-cache-table

  DynamoDBVectorTableName:
    Description: DynamoDB table name for game vectors
    Value: !Ref GameVectorsTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-game-vectors-table

  DynamoDBPrefetchTableName:
    Description: DynamoDB table name for prefetch status
    Value: !Ref PrefetchStatusTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-status-table

  PrefetchQueueUrl:
    Description: SQS queue URL for prefetch jobs
    Value: !Ref PrefetchQueue
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-queue-url

  PrefetchDeadLetterQueueUrl:
    Description: SQS dead letter queue URL for failed prefetch jobs
    Value: !Ref PrefetchDeadLetterQueue
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-dlq-url

  EstimatedMonthlyCost:
    Description: Estimated monthly cost (within free tier limits)
    Value: "$0.00 (if staying within free tier: <1M requests, <25GB DynamoDB, <400K GB-seconds Lambda)"
