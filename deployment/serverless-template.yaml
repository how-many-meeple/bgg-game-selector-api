AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'BGG Game Selector API v3.4.0 - Scala/Tapir native Lambda'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource naming
    AllowedValues:
      - production
      - staging
      - dev

  RateLimitPerMinute:
    Type: Number
    Default: 100
    Description: Maximum API requests per minute per IP (prevents abuse)
    MinValue: 10
    MaxValue: 1000

  BurstLimit:
    Type: Number
    Default: 200
    Description: Maximum burst capacity for API Gateway
    MinValue: 50
    MaxValue: 5000

  BggAccessToken:
    Type: String
    NoEcho: true
    Default: "PLACEHOLDER_REPLACE_ON_DEPLOY"
    Description: BoardGameGeek API access token (pass via --parameter-overrides on deploy)

  ApiDomainName:
    Type: String
    Default: ""
    Description: Custom domain name for the API (e.g. api.example.com). Leave empty to skip CloudFront CNAME setup.

  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for the custom domain (must be in us-east-1 for CloudFront)

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref ApiDomainName, ""]]

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Environment:
      Variables:
        CACHE_BACKEND: dynamodb
        DYNAMODB_REQUEST_TABLE: !Ref RequestCacheTable
        DYNAMODB_GAME_TABLE: !Ref GameCacheTable
        DYNAMODB_VECTOR_TABLE: !Ref GameVectorsTable
        DYNAMODB_PREFETCH_TABLE: !Ref PrefetchStatusTable
        DYNAMODB_REGION: !Ref AWS::Region
        BGG_ACCESS_TOKEN: !Ref BggAccessToken
        BGG_TIMEOUT: '240'
        BGG_RETRIES: '6'
        BGG_RETRY_DELAY: '10'
        REQUEST_CACHE_DURATION: '86400'
        GAME_CACHE_DURATION: '604800'
        PREFETCH_SQS_URL: !Ref PrefetchQueue

Resources:
  # IAM Role for API Gateway to write CloudWatch Logs (Account-level, one-time setup)
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn

  # DynamoDB Tables
  RequestCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-request-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  GameCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-game-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  PrefetchStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-prefetch-status
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  GameVectorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-bgg-game-vectors
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: N
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  # SQS Queue for prefetch jobs
  PrefetchQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-bgg-prefetch-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 3600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PrefetchDeadLetterQueue.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  PrefetchDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-bgg-prefetch-dlq
      MessageRetentionPeriod: 86400
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  # API Lambda — GraalVM native binary, custom runtime (provided.al2023)
  # SyncLambdaHandler decodes API Gateway REST API events directly via tapir-aws-lambda-core.
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-bgg-api
      CodeUri: ./bgg-api-native.zip
      Handler: bgg.lambda.ApiLambdaHandler
      Description: BGG Game Selector API v3 - Scala/Tapir native Lambda
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameVectorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PrefetchStatusTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt PrefetchQueue.QueueName
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /health
            Method: GET
        Hot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /hot
            Method: GET
        GetCollection:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /collection/{username}
            Method: GET
        GetGeekList:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /geeklist/{geek_list}
            Method: GET
        GetGame:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /game/{game_id}
            Method: GET
        Plays:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /plays/{username}
            Method: GET
        SearchGames:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /search/{game_name}
            Method: GET
        CorsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /cors-proxy/{url}
            Method: GET
        RecommendationsFromGames:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/from-games
            Method: POST
        RecommendationsSchema:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /recommendations/schema
            Method: GET
        Prefetch:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch
            Method: POST
        PrefetchStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /prefetch/status/{source_type}/{source_id}
            Method: GET
        # Catch-all OPTIONS for CORS (handled by Tapir/Netty)
        CorsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: OPTIONS
      Tags:
        Environment: !Ref EnvironmentName

  # Worker Lambda — triggered by SQS, custom runtime with LAMBDA_HANDLER to select worker path
  PrefetchWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-bgg-prefetch-worker
      CodeUri: ./bgg-api-native.zip
      Handler: bgg.lambda.PrefetchWorker
      Description: BGG prefetch worker v3 — fetches BGG data async and warms the cache
      Timeout: 900
      Environment:
        Variables:
          LAMBDA_HANDLER: PrefetchWorker
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameVectorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PrefetchStatusTable
        - SQSPollerPolicy:
            QueueName: !GetAtt PrefetchQueue.QueueName
      Events:
        PrefetchQueueTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt PrefetchQueue.Arn
            BatchSize: 1
        WeeklyHotListWarm:
          Type: Schedule
          Properties:
            Schedule: cron(0 4 ? * MON *)
            Description: Warm the hot games cache every Monday at 4am UTC
            Input: '{"Records":[{"body":"{\"source_type\":\"hot\",\"source_id\":\"trending\"}"}]}'
      Tags:
        Environment: !Ref EnvironmentName

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${EnvironmentName}-bgg-api
      StageName: !Ref EnvironmentName
      Description: BGG Game Selector API Gateway v3.1
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: !Ref RateLimitPerMinute
          ThrottlingBurstLimit: !Ref BurstLimit
          LoggingLevel: ERROR
          DataTraceEnabled: false
          MetricsEnabled: true
      BinaryMediaTypes:
        - '*~1*'
      Tags:
        Environment: !Ref EnvironmentName
        CostCenter: free-tier

  # CloudFront CDN — caches /cors-proxy/* at edge to avoid hot-linking BGG images
  CdnDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${EnvironmentName} BGG API CDN — image caching
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [!Ref ApiDomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub ${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com
            OriginPath: !Sub /${EnvironmentName}
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: https-only
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          Compress: true
        CacheBehaviors:
          - PathPattern: /cors-proxy/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods:
              - GET
              - HEAD
            Compress: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: bgg-game-selector

  # CloudWatch Log Groups
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 7


  # CloudWatch Alarms
  HighRequestAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-bgg-api-high-requests
      AlarmDescription: Alert when API requests exceed 80% of free tier (800K requests)
      MetricName: Count
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 800000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Ref ApiGateway
      TreatMissingData: notBreaching

  HighDynamoDBReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-bgg-dynamodb-high-reads
      AlarmDescription: Alert on unusually high DynamoDB read units
      MetricName: ConsumedReadCapacityUnits
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 50000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref GameCacheTable
      TreatMissingData: notBreaching

Outputs:
  CdnEndpoint:
    Description: CloudFront CDN URL (use this for frontend — caches cors-proxy images at edge)
    Value: !Sub https://${CdnDistribution.DomainName}
    Export:
      Name: !Sub ${EnvironmentName}-bgg-cdn-url

  ApiEndpoint:
    Description: API Gateway endpoint URL (direct, bypasses CDN)
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
    Export:
      Name: !Sub ${EnvironmentName}-bgg-api-url

  ApiId:
    Description: API Gateway ID
    Value: !Ref ApiGateway
    Export:
      Name: !Sub ${EnvironmentName}-bgg-api-id

  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub ${EnvironmentName}-bgg-function-arn

  WorkerFunctionArn:
    Description: Prefetch Worker Lambda Function ARN
    Value: !GetAtt PrefetchWorkerFunction.Arn
    Export:
      Name: !Sub ${EnvironmentName}-bgg-worker-function-arn

  DynamoDBRequestTableName:
    Description: DynamoDB table name for request cache
    Value: !Ref RequestCacheTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-request-cache-table

  DynamoDBGameTableName:
    Description: DynamoDB table name for game cache
    Value: !Ref GameCacheTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-game-cache-table

  DynamoDBVectorTableName:
    Description: DynamoDB table name for game vectors
    Value: !Ref GameVectorsTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-game-vectors-table

  DynamoDBPrefetchTableName:
    Description: DynamoDB table name for prefetch status
    Value: !Ref PrefetchStatusTable
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-status-table

  PrefetchQueueUrl:
    Description: SQS queue URL for prefetch jobs
    Value: !Ref PrefetchQueue
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-queue-url

  PrefetchDeadLetterQueueUrl:
    Description: SQS dead letter queue URL for failed prefetch jobs
    Value: !Ref PrefetchDeadLetterQueue
    Export:
      Name: !Sub ${EnvironmentName}-bgg-prefetch-dlq-url
